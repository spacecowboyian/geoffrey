siteTitle: Geoffrey
siteDescription: A build log for my 1962 Renault Dauphine — the little French car that refused to die.
heroTitle: Project Geoffrey
heroText: "Follow along as I restore a 1962 Renault Dauphine back to life. From a field-find with questionable rust to (hopefully) a driver, documented one wrench turn at a time."
aboutText: "Geoffrey is a 1962 Renault Dauphine I picked up from a local farm. The goal is a sympathetic restoration: get it mechanically sound, address the rust properly, and drive it. No trailer queen. This site is my public build log — a place to document the work, the mistakes, and the occasional small victory.\n\nBuilt with Astro and Keystatic."
